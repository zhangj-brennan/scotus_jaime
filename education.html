    function buildSankeyGraph(rows, endpointLabel) {
      const SCALE = 0.6; // shrink vertical node size

      const nodes = [];
      const nodeSeen = new Set();
      const linkMap = new Map();

      function addNode(id, name, type) {
        if (nodeSeen.has(id)) return;
        nodeSeen.add(id);
        nodes.push({ id, name, type });
      }

      function addLink(source, target, value) {
        const key = `${source}|||${target}`;
        if (!linkMap.has(key)) {
          linkMap.set(key, { source, target, value: 0 });
        }
        linkMap.get(key).value += value * SCALE;
      }

      rows.forEach(([justiceRaw, collegeRaw, lawRaw]) => {
        const justice = justiceRaw.trim();
        const college = normalizeCollege(collegeRaw);
        const lawSchools = splitLawSchools(lawRaw);
        const share = lawSchools.length ? 1 / lawSchools.length : 1;

        addNode(`justice:${justice}`, justice, 'justice');
        addNode(`college:${college}`, college, 'college');
        addLink(`justice:${justice}`, `college:${college}`, 1);

        if (!lawSchools.length) {
          addNode(`law:Unknown law school`, 'Unknown law school', 'law');
          addLink(`college:${college}`, `law:Unknown law school`, 1);
          addNode(`endpoint:${endpointLabel}`, endpointLabel, 'endpoint');
          addLink(`law:Unknown law school`, `endpoint:${endpointLabel}`, 1);
          return;
        }

        lawSchools.forEach(lawSchool => {
          addNode(`law:${lawSchool}`, lawSchool, 'law');
          addLink(`college:${college}`, `law:${lawSchool}`, share);
          addNode(`endpoint:${endpointLabel}`, endpointLabel, 'endpoint');
          addLink(`law:${lawSchool}`, `endpoint:${endpointLabel}`, share);
        });
      });

      return {
        nodes,
        links: Array.from(linkMap.values()),
        justiceCount: rows.length,
        collegeCount: nodes.filter(d => d.type === 'college').length,
        lawSchoolCount: nodes.filter(d => d.type === 'law').length
      };
    }

    function normalizeCollege(raw) {
      const cleaned = stripDegreeSuffix(raw || '').trim();
      if (!cleaned) return 'No college listed';
      return COLLEGE_ALIASES.get(cleaned) || cleaned;
    }

    function splitLawSchools(raw) {
      const cleaned = String(raw || '').trim();
      if (!cleaned) return [];
      return cleaned
        .split(';')
        .map(d => stripDegreeSuffix(d).trim())
        .filter(Boolean);
    }

    function stripDegreeSuffix(value) {
      return String(value || '')
        .replace(/\s*\([^)]*\)\s*/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function drawColumnLabels(g, innerWidth) {
      const labels = [
        { text: 'Supreme Court Justices', x: 0 },
        { text: 'College', x: innerWidth * 0.34 },
        { text: 'Law School', x: innerWidth * 0.67 },

      g.append('g')

        .attr('y', 0)
        .attr('text-anchor', d => d.text === 'Supreme Court' ? 'end' : 'start')
        .text(d => d.text);

    function formatValue(value) {
      return Number.isInteger(value) ? value : d3.format('.2f')(value);
    }

    function sanitizeLabel(text) {
      return String(text || '');
    }

    function showTooltip(event, html) {

    function moveTooltip(event) {
      tooltip

        .style('top', `${event.clientY + 14}px`);
    }

    function hideTooltip() {
      tooltip.style('opacity', 0);
